<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Super Admin — Secure Access</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,.6);}
.lock-icon{width:52px;height:52px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;margin:0 auto 20px;}
h1{font-size:14pt;font-weight:800;color:#f1f5f9;text-align:center;margin-bottom:4px;}
.sub{font-size:9pt;color:#64748b;text-align:center;margin-bottom:24px;}
.form-group{margin-bottom:16px;}
label{display:block;font-size:8pt;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin-bottom:5px;}
.pw-wrap{position:relative;}
input[type=password],input[type=text]{width:100%;padding:11px 40px 11px 14px;background:#0f172a;border:1.5px solid #334155;border-radius:8px;color:#f1f5f9;font-size:10.5pt;outline:none;transition:border .2s;}
input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15);}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#64748b;font-size:13px;}
.eye-btn:hover{color:#94a3b8;}
.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;font-size:9pt;color:#fca5a5;margin-bottom:16px;text-align:center;}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;font-size:10.5pt;font-weight:700;border:none;border-radius:9px;cursor:pointer;letter-spacing:.02em;transition:all .2s;}
.btn:hover{background:linear-gradient(135deg,#1e40af,#1d4ed8);transform:translateY(-1px);}
.footer{text-align:center;margin-top:20px;font-size:8pt;color:#334155;}
</style>
</head>
<body>
<div class="card">
  <div class="lock-icon">&#128274;</div>
  <h1>Secure Admin Access</h1>
  <p class="sub">Authorised personnel only</p>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="form-group">
      <label>Access Password</label>
      <div class="pw-wrap">
        <input type="password" name="password" id="pw" required autofocus autocomplete="off" placeholder="Enter admin password"/>
        <button type="button" class="eye-btn" onclick="var i=document.getElementById('pw');var b=this.firstChild;if(i.type==='password'){i.type='text';b.data='🙈';}else{i.type='password';b.data='👁';}"><text>👁</text></button>
      </div>
    </div>
    <button type="submit" class="btn">Authenticate &rarr;</button>
  </form>
  <p class="footer">Access is logged. Unauthorised use is prohibited.</p>
</div>
</body>
</html>
