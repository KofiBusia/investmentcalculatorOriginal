<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>{{ 'Edit' if job else 'New' }} Job — InvestIQ Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>.input-field{width:100%;padding:.65rem 1rem;border:1.5px solid #e2e8f0;border-radius:.5rem;font-size:.93rem;outline:none;transition:border .2s;}.input-field:focus{border-color:#0f4c81;box-shadow:0 0 0 3px rgba(15,76,129,.1);}</style>
</head>
<body class="bg-gray-100 font-sans">
<nav class="bg-blue-900 text-white py-4 px-6">
  <div class="max-w-5xl mx-auto flex justify-between items-center">
    <a href="/admin" class="font-bold text-lg"><i class="fas fa-chart-line mr-2 text-blue-300"></i>InvestIQ Admin</a>
    <a href="/admin/jobs" class="text-blue-200 hover:text-white text-sm"><i class="fas fa-arrow-left mr-1"></i> Back to Jobs</a>
  </div>
</nav>

<main class="max-w-3xl mx-auto px-4 py-8">
  <div class="bg-white rounded-xl shadow border border-gray-100 p-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">{{ 'Edit Job' if job else 'Create New Job' }}</h1>

    {% if error %}<div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-5 text-sm">{{ error }}</div>{% endif %}

    <form method="POST" class="space-y-5">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">Job Title *</label>
          <input type="text" name="title" required class="input-field" value="{{ job.title if job else '' }}" placeholder="Senior Financial Analyst"/>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">Company</label>
          <input type="text" name="company" class="input-field" value="{{ job.company if job else 'InvestIQ' }}" placeholder="InvestIQ"/>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">Location</label>
          <input type="text" name="location" class="input-field" value="{{ job.location if job else '' }}" placeholder="Accra, Ghana"/>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">Sector</label>
          <select name="sector" class="input-field">
            {% for s in ['Finance','Banking','Investment','Accounting','Technology','Risk','Economics','Insurance','Other'] %}
            <option {{ 'selected' if job and job.sector==s else '' }}>{{ s }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">Job Type</label>
          <select name="job_type" class="input-field">
            {% for t in ['Full-Time','Part-Time','Contract','Remote','Internship'] %}
            <option {{ 'selected' if job and job.job_type==t else '' }}>{{ t }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">Salary Range</label>
          <input type="text" name="salary_range" class="input-field" value="{{ job.salary_range if job else '' }}" placeholder="GHS 8,000 – 12,000 / month"/>
        </div>
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Job Description</label>
        <textarea name="description" rows="6" class="input-field" placeholder="Describe the role, responsibilities, and what a successful candidate looks like...">{{ job.description if job else '' }}</textarea>
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Requirements</label>
        <textarea name="requirements" rows="5" class="input-field" placeholder="• CFA or ACCA qualification preferred&#10;• 5+ years experience in investment analysis&#10;• Proficiency in financial modelling">{{ job.requirements if job else '' }}</textarea>
      </div>
      {% if job %}
      <div class="flex items-center gap-2">
        <input type="checkbox" name="is_active" id="is_active" {{ 'checked' if job.is_active else '' }} class="w-4 h-4 text-blue-600"/>
        <label for="is_active" class="text-sm font-semibold text-gray-600">Active (visible on jobs page)</label>
      </div>
      {% endif %}
      <div class="flex gap-3">
        <button type="submit" class="flex-1 bg-blue-900 hover:bg-blue-800 text-white py-3 rounded-lg font-bold text-sm">
          <i class="fas fa-save mr-2"></i>{{ 'Save Changes' if job else 'Create Job' }}
        </button>
        <a href="/admin/jobs" class="px-6 py-3 border border-gray-200 text-gray-600 rounded-lg text-sm font-medium hover:bg-gray-50">Cancel</a>
      </div>
    </form>
  </div>
</main>
</body>
</html>
